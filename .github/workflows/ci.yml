name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ArchLens.Contracts.sln

      - name: Build
        run: dotnet build ArchLens.Contracts.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ArchLens.Contracts.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults --filter "FullyQualifiedName!~BDD"

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check SONAR_TOKEN
        id: check-token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.check-token.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Setup .NET
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java 17
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet restore ArchLens.Contracts.sln

      - name: SonarCloud Begin
        if: steps.check-token.outputs.skip != 'true'
        run: |
          dotnet sonarscanner begin \
            /k:"archlens-platform_archlens-contracts" \
            /o:"archlens-platform" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/tests/**,**/*.Tests/**" \
            /d:sonar.exclusions="**/tests/**"

      - name: Build
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet build ArchLens.Contracts.sln --no-restore --configuration Release

      - name: Test with coverage
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet test ArchLens.Contracts.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover --filter "FullyQualifiedName!~BDD"

      - name: SonarCloud End
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
